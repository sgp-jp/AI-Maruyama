services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-/api}
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=${BACKEND_PORT:-4000}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-app}
      - REDIS_URL=redis://redis:6379
      - FILE_STORAGE_ROOT=/app/data
      - REQUIRED_DISCLAIMER_1=${REQUIRED_DISCLAIMER_1:-本機能は外構の判断補助です}
      - REQUIRED_DISCLAIMER_2=${REQUIRED_DISCLAIMER_2:-最終設計・施工判断は専門業者確認前提です}
      - REQUIRED_DISCLAIMER_3=${REQUIRED_DISCLAIMER_3:-現地条件により内容は変わります}
      - REQUIRED_DISCLAIMER_4=${REQUIRED_DISCLAIMER_4:-提案内容は概念整理であり、施工保証ではありません}
    volumes:
      - ./data:/app/data
    depends_on:
      - db
      - redis
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-app}
      - POSTGRES_USER=${POSTGRES_USER:-app}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-app}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  db_data:
